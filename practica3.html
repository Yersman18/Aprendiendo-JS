<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cargando cookies</title>
</head>
<body onload="mostrarMensaje()">
    <h1 id="titulo"">Agregando valor</h1>
    <div id="mostrandoValores"></div>
    <script>
        function mostrarMensaje(){
            let texto = ""
            alert("cargando datos")
            if(navigator.cookieEnabled){

                texto = "Cookies activados"
            }
            else{
                texto = "Cookies desactivados"
            }

            document.getElementById('mostrandoValores').innerHTML = texto
        }       
    </script>
</body>
</html>
