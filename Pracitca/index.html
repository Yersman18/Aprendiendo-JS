    <!-- 9 EJERICICIO -->
     <form id="formulario">
        Nombre: <input type="text" name="nombre" value="Esteban "><br>
        Apellido: <input type="text" name="apellido" value="Garzon">
     </form>
     <div id="valores"></div>
     <script>
        let textos = ''
        let formulario = document.forms['formulario']
        for(objeto of formulario){
            textos += objeto.value  
        }

        elementos.innerHTML = textos
