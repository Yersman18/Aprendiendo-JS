<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiando de estilos de las paginas</title>
</head>
<body>
    <h1 id="titulo">Bienvenidos a todos</h1>
    <button onclick='cambiandoColor()'>Cambiando de color</button>
    <script>
    function cambiandoColor(){
        document.getElementById('titulo').style.color = 'red'
    }    
    </script>
</body>
</html>
