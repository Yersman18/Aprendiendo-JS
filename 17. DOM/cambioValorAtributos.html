<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiando el contenido</title>
</head>
<body>
    <p id="parrafo">Bienvenidos a todos</p>
    <button onclick="cambiandoElValor()">Cambiar el valor</button>
    <img id="imagen" src="http://globalmentoring.com.mx/imagenes/javascript.png" alt="imagen">
    <script>
        // si las imagenes estan dentro de nuestra carpeta descargada solo colocamos la direccion de la carpetea con el nombre de la imagen
        function cambiandoElValor(){
            //document.getElementById('parrafo').innerHTML = 'Cambiando el valor' // asi cambiamos el valor anterior 
            document.getElementById('imagen').src = "http://globalmentoring.com.mx/imagenes/html5.png" // nos muestra el valor anterior y el actual
        }

    </script>
</body>
</html>
