<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiando de estilos de las paginas</title>
</head>
<body>
    <h1 id="titulo">Bienvenidos a todos</h1>
    <br>
    <div id="mostrar"></div>
    <script>
        document.getElementById('titulo').onclick = mostrarTexto // esto se conoce como funcion callback

        function mostrarTexto(){
            document.getElementById('mostrar').innerHTML = "Nuevo contenido"
        }
    </script>
</body>
</html>
