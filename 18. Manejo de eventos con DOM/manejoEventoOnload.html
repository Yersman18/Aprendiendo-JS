<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiando de estilos de las paginas</title>
</head>
<body onload="entrar()">
    <h1 id="titulo">Bienvenidos a todos</h1>
    <br>
    <div id="mostrar"></div>
    <script>
        function entrar(){
            let texto = ""
            alert('Esta cargando la pagina')
        }

        if (navigator.cookieEnabled){
            texto = "Cookies estan habilitadas"
        }
        else{
            texto = "Cookies estan inabilitadas"
        }
        document.getElementById('mostrar').innerHTML = texto
    </script>
</body>
</html>
