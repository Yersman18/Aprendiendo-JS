<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validando Cookies</title>
</head>
<body onload="validarCookies()">
    <h1>Validando Cookies</h1>
    <div id="mostrandoValor"></div>
    <script>
        
        function validarCookies(){
            let texto = ""
        }
        if(navigator.cookieEnabled){
            texto = "Cookies activadas"
        }
        else{
            texto = "Cookies desactivadas"
        }
        document.getElementById('mostrandoValor').innerHTML = texto
    </script>
</body>
</html>
