<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practicando eventos</title>
</head>
<body>
    <h1 onclick="cambiandoValores(this)">Hola bienvenidos a este curso</h1>
    <script>
        function cambiandoValores(titulo){
            console.log(titulo.innerHTML)
            titulo.innerHTML = "Cambiando de valores"
            console.log(titulo.innerHTML)
        }
    </script>
</body>
</html>
