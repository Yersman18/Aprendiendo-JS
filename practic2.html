<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregando valores</title>
</head>
<body>
    <h1 id="titulo"">Agregando valor</h1>
    <div id="mostrandoValores"></div>

        document.getElementById("titulo").onclick =  mostrarvalores

        }       
    </script>
</body>
</html>
